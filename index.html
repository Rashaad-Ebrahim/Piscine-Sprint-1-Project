<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spaced Repetition Tracker</title>
    <script type="module" src="script.mjs"></script>
  </head>
  <body>
    <header>
      <h1>Spaced Repetition Tracker</h1>
    </header>

    <main>
      <!-- Dropdown menu / user selection -->

      <section>
        <label for="user-select">Select a user:</label>
        <select id="user-select">
          <option value="">-- Select a user --</option>
        </select>
      </section>

      <!-- Agenda display  -->

      <section id="agenda-section">
        <h2>Upcoming Revisions</h2>
        

        <!-- No  agenda, hidden property to be added when not applicable -->
        <p id="agenda-message">No agenda found for this user.</p>

        <!-- When there is an agenda, hidden property to be added when not applicable -->
        <ul id="agenda-list"></ul>
      </section>

      <!-- Add topic form -->

      <section id="form-section">
        <h2>Add a New Topic</h2>
        <form id="topic-form">
          <fieldset>
            <legend>Details:</legend>
            <div>
              <label for="topic-name">Topic Name:</label>
              <input type="text" id="topic-name" name="topic-name" required />
            </div>
            <br />
            <div>
              <label for="revision-date">Start Date:</label>
              <input
                type="date"
                id="revision-date"
                name="revision-date"
                required
              />
            </div>
            <br />
            <button type="submit">Add Topic</button>
          </fieldset>
        </form>
      </section>
    </main>

    <footer>
      <p>R & R Develops - Spaced Repetition Tracker © 2025</p>
    </footer>
  </body>
</html>
